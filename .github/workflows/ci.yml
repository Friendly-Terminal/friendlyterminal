name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: linux/package-lock.json
      - run: sudo apt-get update
      - run: sudo apt-get install --yes build-essential python3 rpm
      - run: npm ci
      - run: npm test
      - run: npm run package

  windows-core:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet test windows/FriendlyTerminal.sln --configuration Release

  windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: microsoft/setup-msbuild@v2
      - run: windows\scripts\package.ps1
        shell: pwsh

  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: xcodegen generate
      - run: >-
          xcodebuild
          -project FriendlyTerminal.xcodeproj
          -scheme FriendlyTerminal
          -configuration Debug
          -destination 'platform=macOS,arch=arm64'
          CODE_SIGNING_ALLOWED=NO
          build
