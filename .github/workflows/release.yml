name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: ./scripts/build-and-package.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: build/FriendlyTerminal.dmg
          if-no-files-found: error

  linux:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: linux/package-lock.json
      - run: sudo apt-get update
      - run: sudo apt-get install --yes build-essential python3 rpm
      - run: npm ci
      - run: npm test
      - run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux/release/*
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: microsoft/setup-msbuild@v2
      - run: windows\scripts\package.ps1
        shell: pwsh
      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows/release/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos
      - linux
      - windows
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ### macOS

            Download `FriendlyTerminal.dmg`, open it, and drag FriendlyTerminal
            into Applications. On first launch, right-click the app and choose Open.

            ### Linux

            Ubuntu and Debian users should download the `.deb`. Fedora and RPM-based
            distributions should download the `.rpm`. The AppImage is the portable
            option for other distributions; mark it executable once, then open it.

            ### Windows

            Download `FriendlyTerminal-Setup-<version>-x64.exe` and run it. The
            installer is unsigned, so SmartScreen may show "Windows protected your
            PC"; click **More info**, then **Run anyway**. It installs per-user with
            no administrator prompt. The portable `FriendlyTerminal-<version>-x64.zip`
            is an alternative: extract it and run `FriendlyTerminal.App.exe` from
            the extracted `FriendlyTerminal` folder.
